<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relink Summary</title>

<link href="https://fonts.googleapis.com/css2?family=Climate+Crisis&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  font-family:'Climate Crisis', sans-serif;
  color:white;
}

.bg{
  position:fixed;
  inset:0;
  background:url('background.webp') center/cover no-repeat;
  filter:blur(10px) brightness(0.4);
  transform:scale(1.1);
  z-index:-2;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  z-index:-1;
}

.wrap{
  width:100vw;
  height:100vh;
  position:relative;
}

.slide{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px;
  opacity:0;
  transform:translateY(20px) scale(0.96);
  transition:all 0.7s ease;
}

.slide.active{
  opacity:1;
  transform:translateY(0) scale(1);
}

h1{font-size:3rem;margin:0;}

.text{font-family:Arial;margin-top:15px;opacity:0.85;}

.list{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.item{
  background:rgba(255,255,255,0.1);
  padding:10px 16px;
  border-radius:12px;
}

.carousel img{
  width:80%;
  max-height:60vh;
  border-radius:16px;
  object-fit:cover;
  transition:opacity 0.4s;
}

.nav{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
}

button{
  border:none;
  padding:10px 20px;
  border-radius:999px;
  cursor:pointer;
  background:white;
  font-family:'Climate Crisis';
}

#progress{
  position:fixed;
  top:0;
  left:0;
  height:4px;
  width:0%;
  background:white;
  transition:0.3s;
  z-index:999;
}

audio{display:none;}
</style>
</head>

<body>

<div id="progress"></div>
<div class="bg"></div>
<div class="overlay"></div>

<div class="wrap" id="wrap"></div>
<audio id="audio"></audio>

<div class="nav">
  <button onclick="prev()">Back</button>
  <button onclick="next()">Next</button>
</div>

<script>

const data = JSON.parse(sessionStorage.getItem('relinkData') || '{}');
const images = JSON.parse(sessionStorage.getItem('relinkImages') || '[]');

data.images = images;

let i = 0;
let photoIndex = 0;
let timer = null;
let locked = false;

const audio = document.getElementById('audio');
let songIndex = 0;
let unlocked = false;

document.addEventListener('click', ()=> unlocked = true, { once:true });

function playMusic(){
  if(!unlocked || !data.songs?.length) return;

  const track = data.songs[songIndex % data.songs.length];
  if(!track?.preview) return;

  audio.src = track.preview;
  audio.play().catch(()=>{});
  songIndex++;
}

audio.addEventListener('ended', playMusic);

/* 🔥 MOSTRA TUTTO QUELLO CHE ESISTE */
const sections = [
  { title:`${data.groupName || "Your group"} Rewind` },

  data.images?.length && { title:"Images", photos:data.images },

  data.memes?.length && { title:"Memes", list:data.memes },

  data.moments?.length && { title:"Moments", list:data.moments },

  data.phrases?.length && { title:"Phrases", list:data.phrases },

  data.jokes?.length && { title:"Inside jokes", list:data.jokes },

  data.songs?.length && {
    title:"Songs",
    list:data.songs.map(s => s.title || "Unknown song")
  },

  { title:"The End", text:"See you next year." }
].filter(Boolean);

const jokes = [
  "Peak chaos.",
  "No control detected.",
  "Still alive somehow.",
  "Questionable decisions."
];

let slides = [];
sections.forEach((s, idx)=>{
  slides.push(s);
  if(idx>0 && idx<sections.length-1){
    slides.push({ joke:true });
  }
});

function startCarousel(){
  stopCarousel();

  const photos = slides[i].photos;
  if(!photos || photos.length <= 1) return;

  timer = setInterval(()=>{
    photoIndex = (photoIndex + 1) % photos.length;
    const img = document.getElementById('img');
    if(!img) return;

    img.style.opacity = 0;
    setTimeout(()=>{
      img.src = photos[photoIndex];
      img.style.opacity = 1;
    },200);
  },2000);
}

function stopCarousel(){
  if(timer) clearInterval(timer);
}

function render(){
  const wrap = document.getElementById('wrap');
  wrap.innerHTML = '';

  const s = slides[i];
  const el = document.createElement('div');
  el.className = 'slide active';

  if(s.joke){
    el.innerText = jokes[Math.floor(Math.random()*jokes.length)];
    stopCarousel();
  }

  else if(s.photos){
    photoIndex = 0;
    el.innerHTML = `
      <h1>${s.title}</h1>
      <div class="carousel">
        <img id="img" src="${s.photos[0]}">
      </div>
    `;
    startCarousel();
  }

  else{
    let html = `<h1>${s.title}</h1>`;

    if(s.text){
      html += `<div class="text">${s.text}</div>`;
    }

    if(s.list?.length){
      html += `<div class="list">
        ${s.list.map(x=>`<div class="item">${x}</div>`).join('')}
      </div>`;
    }

    el.innerHTML = html;
    stopCarousel();
  }

  wrap.appendChild(el);
  updateProgress();
  setTimeout(playMusic, 200);
}

function next(){
  if(locked) return;
  locked = true;

  if(i < slides.length - 1){
    i++;
    render();
  }

  setTimeout(()=>locked=false, 500);
}

function prev(){
  if(locked) return;
  locked = true;

  if(i > 0){
    i--;
    render();
  }

  setTimeout(()=>locked=false, 500);
}

function updateProgress(){
  document.getElementById('progress').style.width =
    ((i+1)/slides.length)*100 + '%';
}

document.addEventListener('keydown', e=>{
  if(e.key==="ArrowRight") next();
  if(e.key==="ArrowLeft") prev();
});

render();

</script>

</body>
</html>
