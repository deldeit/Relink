<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Relink - yearly summary generator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Climate+Crisis&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url('background.webp') center/cover no-repeat;
  font-family:'Climate Crisis', sans-serif;
  color:white;
  overflow:hidden;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
}

.container{
  position:relative;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:28px;
  z-index:2;
}

.titleRow{
  display:flex;
  align-items:baseline;
  justify-content:center;
  gap:18px;
  flex-wrap:wrap;
}

h1{
  font-size:3rem;
  margin:0;
  letter-spacing:1px;
}

.year{
  font-size:2.4rem;
  opacity:0.95;
}

.buttons{
  display:flex;
  gap:16px;
  margin-top:10px;
}

.btn{
  padding:14px 28px;
  border-radius:999px;
  border:none;
  cursor:pointer;
  font-family:'Climate Crisis', sans-serif;
  font-size:1rem;
  min-width:190px;
  transition:transform .2s ease, opacity .2s ease;
}

.btn:hover{
  transform:translateY(-2px);
}

.btn.primary{
  background:white;
  color:black;
}

.btn.secondary{
  background:rgba(255,255,255,0.14);
  color:white;
  border:1px solid rgba(255,255,255,0.25);
  backdrop-filter: blur(10px);
}

input{display:none;}
</style>
</head>

<body>
<div class="overlay"></div>

<div class="container">

  <div class="titleRow">
    <h1>Let's rewind</h1>
    <div class="year" id="year">0</div>
  </div>

  <div class="buttons">
    <button class="btn primary" onclick="goCreate()">Create rewind</button>
    <button class="btn secondary" onclick="document.getElementById('file').click()">Upload rewind</button>
  </div>

  <input id="file" type="file" accept="application/json" />

</div>

<script>
const targetYear = new Date().getFullYear() - 1;
const yearEl = document.getElementById('year');

let current = targetYear - 6;

function animateCounter(){
  const interval = setInterval(()=>{
    current++;
    yearEl.innerText = current;

    if(current >= targetYear){
      clearInterval(interval);
      yearEl.innerText = targetYear;
    }
  }, 110);
}

animateCounter();

function goCreate(){
  window.location.href = 'survey.html';
}

document.getElementById('file').addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  if(!file) return;

  const text = await file.text();

  try{
    const data = JSON.parse(text);
    localStorage.setItem('relinkData', JSON.stringify(data));
    window.location.href = 'summary.html';
  }catch(err){
    alert('Invalid rewind file');
  }
});
</script>
</body>
</html>
